name: Model Training (Python)

on:
  schedule:
    - cron: '0 7 * * 1'   # weekly on Mondays at 7am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train_python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: cron/requirements.txt

      - name: Install dependencies
        run: pip install -r cron/requirements.txt

      - name: Run training script
        run: python cron/02_train_model.py

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: xgboost-model
          path: |
            cron/data/modelpy.json
            cron/data/validationpy.json

      - name: Commit model files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cron/data/modelpy.json cron/data/validationpy.json
          git diff --cached --quiet || git commit -m "chore: retrain python model [skip ci]"
          git push
